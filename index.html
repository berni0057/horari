<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Horari Escolar 🕗</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      background: #e0f7fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.4s;
    }
    .container {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;
      padding-top: 10vh;
      box-sizing: border-box;
    }
    #datetime {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 10px;
    }
    #date-box, #time-box {
      background: white;
      border-radius: 10px;
      padding: 12px 28px;
      margin: 4px 0;
      font-weight: bold;
      font-size: 3.5rem;
      color: black;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      user-select: none;
    }
    #main-message {
      font-size: 5.5rem;
      font-weight: 900;
      text-align: center;
      color: #006064;
      user-select: none;
    }
    #secondary-message {
      font-size: 2.2rem;
      font-weight: 500;
      text-align: center;
      color: #004d40;
      margin-top: 12px;
      user-select: none;
    }
    #settings-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 75px;
      height: 75px;
      background: white;
      border-radius: 50%;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      user-select: none;
      z-index: 1000;
    }
    #settings-btn img {
      width: 43px;
      height: 43px;
      pointer-events: none;
    }
    #settings-menu {
      position: fixed;
      top: 100px;
      right: 20px;
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 1000;
      min-width: 220px;
      opacity: 0;
      transform: translateY(-10px) scale(0.95);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #settings-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: #004d40;
      gap: 12px;
      margin-bottom: 14px; 
    }
    .setting-row:last-child {
      margin-bottom: 0;
    }
    .switch {
      width: 52px;
      height: 28px;
      background: #ccc;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
    }

    .switch::after {
      content: "";
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: left 0.3s;
    }

    .switch.active {
      background: #26a69a;
    }

    .switch.active::after {
      left: 27px;
    }

    #settings-menu input {
      width: 120px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

  </style>
</head>
<body>
  <div id="settings-btn">
    <img src="settings.svg" alt="Configuració">
  </div>

  <div id="settings-menu">

    <div class="setting-row">
      <span>Mode enorme</span>
      <div class="switch" id="hugeModeToggle"></div>
    </div>
    <div class="setting-row">
      <span>Hora d'internet</span>
      <div class="switch" id="internetTimeToggle"></div>
    </div>

    <div class="setting-row">
      <span>Color del text</span>
      <input
        type="text"
        id="textColorInput"
        placeholder="p. ex. #333333"
      >
    </div>

    <div class="setting-row">
      <span>Color del fons</span>
      <input
        type="text"
        id="bgColorInput"
        placeholder="p. ex. #f4f4f4"
      >
    </div>

  </div>

  <div class="container">
    <div id="datetime">
      <div id="date-box"></div>
      <div id="time-box"></div>
    </div>
    <div id="main-message"></div>
    <div id="secondary-message"></div>
  </div>
  <script>
    function padZero(num, length = 2) {
      return num.toString().padStart(length, '0');
    }
    function formatTimeDiff(diffMs, withHours = false) {
      let totalSeconds = Math.floor(diffMs / 1000);
      let hours = Math.floor(totalSeconds / 3600);
      let minutes = Math.floor((totalSeconds % 3600) / 60);
      let seconds = totalSeconds % 60;
      if (withHours) {
        return `${padZero(hours)}:${padZero(minutes)}:${padZero(seconds)}`;
      } else {
        return `${padZero(minutes)}:${padZero(seconds)}`;
      }
    }

    let flashInterval = null;
    let isFlashing = false;
    const defaultBg = "#e0f7fa";
    const flashBg = "#F89F90";
    let hugeMode = false;
    let useInternetTime = true;
    let baseTime = null;
    let baseTimestamp = null;
    let syncInterval = null;
    let timeApiError = false;

    const internetSwitch = document.getElementById("internetTimeToggle");
    const hugeSwitch = document.getElementById("hugeModeToggle");
    const textColorInput = document.getElementById("textColorInput");
    const bgColorInput = document.getElementById("bgColorInput");
    internetSwitch.classList.add("active");

    async function fetchInternetTime() {
      try {
        const response = await fetch(
          "https://time.now/developer/api/timezone/Europe/Madrid"
        );
        if (!response.ok) throw new Error("Error API");

        const data = await response.json();
        const apiTime = new Date(data.datetime);

        baseTime = apiTime;
        baseTimestamp = Date.now();
        timeApiError = false;

        console.log("Hora sincronitzada correctament (timeapi.io)");
      } catch (error) {
        console.error("Error obtenint hora d'internet:", error);
        timeApiError = true;
      }
    }

    fetchInternetTime();
    syncInterval = setInterval(fetchInternetTime, 600000);

    function getAccurateNow() {
      if (useInternetTime && baseTime && baseTimestamp) {
        const diff = Date.now() - baseTimestamp;
        return new Date(baseTime.getTime() + diff);
      }
      return new Date();
    }

    // colors actuals
    let currentTextColor = "#006064";
    let currentBgColor = defaultBg;

    // placeholders amb recomanació
    textColorInput.placeholder = "p. ex. " + currentTextColor;
    bgColorInput.placeholder = "p. ex. " + currentBgColor;

    function startFlashingBackground() {
      if (isFlashing) return;
      isFlashing = true;
      let toggle = false;
      flashInterval = setInterval(() => {
        document.body.style.backgroundColor = toggle ? defaultBg : flashBg;
        toggle = !toggle;
      }, 1000);
    }

    function stopFlashingBackground() {
      if (flashInterval) {
        clearInterval(flashInterval);
        flashInterval = null;
      }
      isFlashing = false;
      document.body.style.backgroundColor = currentBgColor;
    }
    const settingsBtn = document.getElementById("settings-btn");
    const settingsMenu = document.getElementById("settings-menu");

    settingsBtn.addEventListener("click", () => {
      settingsMenu.classList.toggle("open");
    });
    settingsMenu.addEventListener("mouseleave", () => {
      settingsMenu.classList.remove("open");
    });


    hugeSwitch.addEventListener("click", () => {
      hugeMode = !hugeMode;
      hugeSwitch.classList.toggle("active");

      document.getElementById("datetime").style.display = hugeMode ? "none" : "flex";
      //document.getElementById("secondary-message").style.display = hugeMode ? "none" : "block";

      document.getElementById("main-message").style.fontSize =
        hugeMode ? "15rem" : "7rem";
      
      update();
    });

    internetSwitch.addEventListener("click", async () => {
      useInternetTime = !useInternetTime;
      internetSwitch.classList.toggle("active");

      if (useInternetTime) {
        await fetchInternetTime();
        syncInterval = setInterval(fetchInternetTime, 600000);
      } else {
        clearInterval(syncInterval);
        syncInterval = null;
      }

      update();
    });

    textColorInput.addEventListener("input", () => {
      if (/^#([0-9A-Fa-f]{6})$/.test(textColorInput.value)) {
        currentTextColor = textColorInput.value;
        document.getElementById("main-message").style.color = currentTextColor;
        document.getElementById("secondary-message").style.color = currentTextColor;
      }
    });

    bgColorInput.addEventListener("input", () => {
      if (/^#([0-9A-Fa-f]{6})$/.test(bgColorInput.value)) {
        currentBgColor = bgColorInput.value;
        document.body.style.backgroundColor = currentBgColor;
      }
    });

    function update() {
      const now = getAccurateNow();
      const day = padZero(now.getDate());
      const month = padZero(now.getMonth() + 1);
      const year = now.getFullYear();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();
      const dateStr = `${day}/${month}/${year}`;
      const timeStr = `${padZero(hours)}:${padZero(minutes)}:${padZero(seconds)}`;
      document.getElementById('date-box').textContent = dateStr;
      document.getElementById('time-box').textContent = timeStr;

      const messageEl = document.getElementById('main-message');
      const secondaryEl = document.getElementById('secondary-message');
      secondaryEl.textContent = "";

      if (useInternetTime && timeApiError) {
        secondaryEl.textContent = "⚠️ Error amb l'hora d'internet. Usant hora local.";
      }

      const dayOfWeek = now.getDay();
      const totalMinutes = hours * 60 + minutes;

      const schedule = [
        { start: 8 * 60, end: 9 * 60, type: 'classe' },
        { start: 9 * 60, end: 10 * 60, type: 'classe' },
        { start: 10 * 60, end: 10 * 60 + 20, type: 'esbarjo' },
        { start: 10 * 60 + 20, end: 11 * 60 + 20, type: 'classe' },
        { start: 11 * 60 + 20, end: 12 * 60 + 20, type: 'classe' },
        { start: 12 * 60 + 20, end: 12 * 60 + 40, type: 'esbarjo' },
        { start: 12 * 60 + 40, end: 13 * 60 + 35, type: 'classe' },
        { start: 13 * 60 + 35, end: 14 * 60 + 30, type: 'finalclasse' },
      ];

      function getCurrentSlot(minuteOfDay) {
        for (const slot of schedule) {
          if (minuteOfDay >= slot.start && minuteOfDay < slot.end) {
            return slot;
          }
        }
        return null;
      }

      function getNextChange(minuteOfDay) {
        for (const slot of schedule) {
          if (slot.start > minuteOfDay) {
            return slot;
          }
        }
        return null;
      }

      // Flash del fons entre 14:29 i 14:30 (869 a 870 min), només dilluns a divendres
      if (dayOfWeek >= 1 && dayOfWeek <= 5 && totalMinutes === 869) {
        startFlashingBackground();
      } else {
        stopFlashingBackground();
      }

      if (dayOfWeek === 0 || dayOfWeek === 6 || (dayOfWeek === 5 && totalMinutes >= 870)) {
        messageEl.textContent = "🎉 Bon cap de setmana!";
        return;
      }

      if (dayOfWeek >= 1 && dayOfWeek <= 4 && totalMinutes >= 870) {
        messageEl.textContent = "🌙 Fins demà!";
        return;
      }

      if (dayOfWeek >= 1 && dayOfWeek <= 5 && totalMinutes < 480) {
        const diffMs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 8, 0, 0) - now;
        messageEl.textContent = "🕗 Falta " + formatTimeDiff(diffMs, true) + " per comencar les classes";
        return;
      }

      if (dayOfWeek >= 1 && dayOfWeek <= 5 && totalMinutes >= 480 && totalMinutes < 870) {
        const currentSlot = getCurrentSlot(totalMinutes);
        if (currentSlot) {
          const endMinute = currentSlot.end;
          const nextChangeTime = new Date(
            now.getFullYear(),
            now.getMonth(),
            now.getDate(),
            Math.floor(endMinute / 60),
            endMinute % 60,
            0
          );
          const diffMs = nextChangeTime - now;

          if (currentSlot.type === 'esbarjo') {
            messageEl.textContent = hugeMode
              ? formatTimeDiff(diffMs, false)
              : "⏳ Falta " + formatTimeDiff(diffMs, false) + " per tornar a classe";
          } else if (currentSlot.type === 'finalclasse') {
            messageEl.textContent = hugeMode
              ? formatTimeDiff(diffMs, false)
              : "🏁 Falta " + formatTimeDiff(diffMs, false) + " per acabar les classes d'avui!";
          } else {
            const nextSlot = getNextChange(totalMinutes);
            if (nextSlot && nextSlot.type === 'esbarjo') {
              messageEl.textContent = hugeMode
                ? formatTimeDiff(diffMs, false)
                : "⏳ Falta " + formatTimeDiff(diffMs, false) + " per l'esbarjo";
            } else {
              messageEl.textContent = hugeMode
                ? formatTimeDiff(diffMs, false)
                : "⏳ Falta " + formatTimeDiff(diffMs, false) + " pel canvi de classe";
            }
          }

          const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 14, 30, 0);
          const timeLeftMs = endOfDay - now;
          secondaryEl.textContent = hugeMode
            ? "🕓: " + formatTimeDiff(timeLeftMs, true)
            : "🕓 Per acabar les classes d'avui falta: " + formatTimeDiff(timeLeftMs, true);

          return;
        }
      }

      messageEl.textContent = "";
    }

    // Intent inicial si està activat
    if (useInternetTime) {
      fetchInternetTime();
      syncInterval = setInterval(fetchInternetTime, 600000);
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
