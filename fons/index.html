<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../favicon.png">
  <title>Fons Horari 🕗</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;

      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;

      background: linear-gradient(
          -45deg,
          #e0f7fa,
          #b2ebf2,
          #80deea,
          #4dd0e1
      );

      background-size: 400% 400%;
      animation: gradientMove 18s ease infinite;

      font-family: "Inconsolata", monospace;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes gradientMove {
        0% {
        background-position: 0% 50%;
        }

        50% {
        background-position: 100% 50%;
        }

        100% {
        background-position: 0% 50%;
        }
    }

    .container {
        text-align: center;
        color: #004d40;

        padding: 60px;

        transform: scale(1.12);
    }

    #datetime {
        display: flex;
        justify-content: center;
        gap: 18px;

        margin-bottom: 55px;

        flex-wrap: wrap;
    }

    .box {
        background: rgba(255, 255, 255, 0.88);

        backdrop-filter: blur(12px);

        padding: 16px 34px;

        border-radius: 18px;

        font-size: 2.7rem;
        font-weight: 800;

        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
    }

    #main-message {
        font-size: 7rem;

        font-weight: 900;

        line-height: 1.05;

        letter-spacing: -2px;
    }

    #secondary-message {
        margin-top: 26px;

        font-size: 2.5rem;

        font-weight: 700;
    }

    .flash {
        animation: flashBg 1s infinite;
    }

    @keyframes flashBg {
        0% {
        background: #ff5252;
        }

        50% {
        background: #ffffff;
        }

        100% {
        background: #ff5252;
        }
    }

    @media (max-width: 900px) {

        .container {
        transform: scale(1);
        padding: 30px;
        }

        #main-message {
        font-size: 4.5rem;
        }

        #secondary-message {
        font-size: 1.9rem;
        }

        .box {
        font-size: 2rem;
        padding: 12px 24px;
        }
    }
    </style>
</head>
<body>

  <div class="container">

    <div id="datetime">
      <div class="box" id="date-box"></div>
      <div class="box" id="time-box"></div>
    </div>

    <div id="main-message"></div>
    <div id="secondary-message"></div>

  </div>

  <script>

    let baseTime = null;
    let baseTimestamp = null;

    async function fetchInternetTime() {
      try {
        const response = await fetch(
          "https://timeapi.io/api/time/current/zone?timeZone=Europe/Madrid"
        );

        const data = await response.json();

        baseTime = new Date(data.dateTime);
        baseTimestamp = Date.now();

      } catch (err) {
        console.error("Error obtenint hora:", err);
      }
    }

    function getNow() {
      if (!baseTime || !baseTimestamp) {
        return new Date();
      }

      const diff = Date.now() - baseTimestamp;

      return new Date(baseTime.getTime() + diff);
    }

    function pad(n) {
      return n.toString().padStart(2, "0");
    }

    function format(ms, hours = false) {

      const total = Math.floor(ms / 1000);

      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;

      if (hours) {
        return `${pad(h)}:${pad(m)}:${pad(s)}`;
      }

      return `${pad(m)}:${pad(s)}`;
    }

    function update() {

      document.body.classList.remove("flash");

      const now = getNow();

      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();

      const totalMinutes = h * 60 + m;

      document.getElementById("date-box").textContent =
        `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;

      document.getElementById("time-box").textContent =
        `${pad(h)}:${pad(m)}:${pad(s)}`;

      const message = document.getElementById("main-message");
      const secondary = document.getElementById("secondary-message");

      const day = now.getDay();

      const schedule = [
        { start: 480, end: 540, text: "classe" },
        { start: 540, end: 600, text: "classe" },
        { start: 600, end: 620, text: "esbarjo" },
        { start: 620, end: 680, text: "classe" },
        { start: 680, end: 740, text: "classe" },
        { start: 740, end: 760, text: "esbarjo" },
        { start: 760, end: 815, text: "classe" },
        { start: 815, end: 870, text: "final" }
      ];

      if (day === 0 || day === 6 || (day === 5 && totalMinutes >= 870)) {
        message.textContent = "🎉 Bon cap de setmana!";
        secondary.textContent = "";
        return;
      }

      if (day >= 1 && day <= 4 && totalMinutes >= 870) {
        message.textContent = "🌙 Fins demà!";
        secondary.textContent = "";
        return;
      }

      if (totalMinutes < 480) {

        const target = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
          8,0,0
        );

        const diff = target - now;

        message.textContent =
          format(diff, true);

        secondary.textContent =
          "Per començar les classes";

        return;
      }

      for (const slot of schedule) {

        if (totalMinutes >= slot.start && totalMinutes < slot.end) {

          const target = new Date(
            now.getFullYear(),
            now.getMonth(),
            now.getDate(),
            Math.floor(slot.end / 60),
            slot.end % 60,
            0
          );

          const diff = target - now;

          message.textContent = format(diff);

          if (slot.text === "esbarjo") {

            secondary.textContent = "per tornar a classe";

          }
          else if (slot.text === "final") {

            secondary.textContent = "per acabar les classes";

          }
          else {

            const nextSlot = schedule.find(s => s.start === slot.end);

            if (nextSlot && nextSlot.text === "esbarjo") {
              secondary.textContent = "per l'esbarjo";
            } else {
              secondary.textContent = "pel canvi de classe";
            }

          }

          break;
        }
      }

      // Flash final
      if (totalMinutes === 869) {
        document.body.classList.add("flash");
      } else {
        document.body.classList.remove("flash");
      }
    }

    fetchInternetTime();

    setInterval(fetchInternetTime, 600000);

    setInterval(update, 1000);

    update();

  </script>

</body>
</html>
