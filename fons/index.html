<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../favicon.png">
  <title>Fons Horari 🕗</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;

      background: linear-gradient(
          -45deg,
          #e0f7fa,
          #b2ebf2,
          #80deea,
          #4dd0e1
      );
      background-size: 400% 400%;
      animation: gradientMove 18s ease infinite;
      font-family: "Inconsolata", monospace;

      display: flex;
      justify-content: center;
      align-items: center;
      /* Força l'ús de la GPU per mantenir la CPU al 0% */
      transform: translateZ(0);
    }

    @keyframes gradientMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .container {
      text-align: center;
      color: #004d40;
      padding: 60px;
      transform: scale(1.12);
      will-change: transform;
    }

    #datetime {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 55px;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px 34px;
      border-radius: 18px;
      font-size: 2.7rem;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
    }

    #main-message {
      font-size: 7rem;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -2px;
    }

    #secondary-message {
      margin-top: 26px;
      font-size: 2.5rem;
      font-weight: 700;
    }

    .flash {
      animation: flashBg 1s infinite steps(2);
    }

    @keyframes flashBg {
      0%, 100% { background: #ff5252; }
      50% { background: #ffffff; }
    }

    @media (max-width: 900px) {
      .container { transform: scale(1); padding: 30px; }
      #main-message { font-size: 4.5rem; }
      #secondary-message { font-size: 1.9rem; }
      .box { font-size: 2rem; padding: 12px 24px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="datetime">
      <div class="box" id="date-box"></div>
      <div class="box" id="time-box"></div>
    </div>
    <div id="main-message"></div>
    <div id="secondary-message"></div>
  </div>

  <script>
    // Memòria cau del DOM (Evita re-calcular la cerca d'elements cada segon)
    const dateBox = document.getElementById("date-box");
    const timeBox = document.getElementById("time-box");
    const mainMessage = document.getElementById("main-message");
    const secondaryMessage = document.getElementById("secondary-message");
    const bodyStyle = document.body.classList;

    let baseTime = null;
    let baseTimestamp = null;
    let lastDateStr = "";
    let isFlashing = false;

    // Horari optimitzat amb els missatges secundaris ja precalculats
    const schedule = [
      { start: 480, end: 540, text: "pel canvi de classe" },
      { start: 540, end: 600, text: "per l'esbarjo" },
      { start: 600, end: 620, text: "per tornar a classe" },
      { start: 620, end: 680, text: "pel canvi de classe" },
      { start: 680, end: 740, text: "per l'esbarjo" },
      { start: 740, end: 760, text: "per tornar a classe" },
      { start: 760, end: 815, text: "pel canvi de classe" },
      { start: 815, end: 870, text: "per acabar les classes" }
    ];

    // Mantinguda la teva funció de xarxa per ordinadors amb hora incorrecta
    async function fetchInternetTime() {
      try {
        const response = await fetch("https://timeapi.io/api/time/current/zone?timeZone=Europe/Madrid");
        const data = await response.json();
        baseTime = new Date(data.dateTime);
        baseTimestamp = Date.now();
      } catch (err) {
        console.error("Error obtenint hora de la xarxa:", err);
      }
    }

    function getNow() {
      if (!baseTime || !baseTimestamp) return new Date();
      return new Date(baseTime.getTime() + (Date.now() - baseTimestamp));
    }

    // Mètode ràpid de format de text sense instanciar strings pesats
    const pad = n => n < 10 ? '0' + n : n;

    function format(totalSeconds, showHours = false) {
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return showHours ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
    }

    function update() {
      const now = getNow();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();

      const totalMinutes = h * 60 + m;
      const currentSeconds = (totalMinutes * 60) + s;

      // Rendiment: Actualitza la data només si realment ha canviat de dia
      const dateStr = `${pad(now.getDate())}/${pad(now.getMonth() + 1)}/${now.getFullYear()}`;
      if (lastDateStr !== dateStr) {
        dateBox.textContent = dateStr;
        lastDateStr = dateStr;
      }

      timeBox.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
      const day = now.getDay();

      // Cap de setmana o divendres tarda
      if (day === 0 || day === 6 || (day === 5 && totalMinutes >= 870)) {
        mainMessage.textContent = "🎉 Bon cap de setmana!";
        secondaryMessage.textContent = "";
        if (isFlashing) { bodyStyle.remove("flash"); isFlashing = false; }
        return;
      }

      // Tardes de dilluns a dijous
      if (totalMinutes >= 870) {
        mainMessage.textContent = "🌙 Fins demà!";
        secondaryMessage.textContent = "";
        if (isFlashing) { bodyStyle.remove("flash"); isFlashing = false; }
        return;
      }

      // Abans d'entrar a classe (08:00 són 28800 segons des de les 00:00)
      if (totalMinutes < 480) {
        mainMessage.textContent = format(28800 - currentSeconds, true);
        secondaryMessage.textContent = "Per començar les classes";
        return;
      }

      // Bucle ultra-ràpid indexat (Evita crear objectes Date interns)
      for (let i = 0; i < schedule.length; i++) {
        const slot = schedule[i];
        if (totalMinutes >= slot.start && totalMinutes < slot.end) {
          const diffSeconds = (slot.end * 60) - currentSeconds;
          mainMessage.textContent = format(diffSeconds, false);
          secondaryMessage.textContent = slot.text;
          break;
        }
      }

      // Control eficient de l'efecte Flash de l'últim minut
      if (totalMinutes === 869) {
        if (!isFlashing) { bodyStyle.add("flash"); isFlashing = true; }
      } else {
        if (isFlashing) { bodyStyle.remove("flash"); isFlashing = false; }
      }
    }

    // Inicialització i llançament d'intervals
    fetchInternetTime();
    setInterval(fetchInternetTime, 600000); // Sincronitza amb internet cada 10 minuts
    
    update();
    setInterval(update, 1000); // Actualització visual cada segon
  </script>

</body>
</html>
